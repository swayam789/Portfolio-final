<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>swayam@chitwan:~$</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12161C; --bone:#E9E5DB; --mute:#8B95A1; --copper:#C08552; --line:#2A333E;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ink)}
  body{font-family:'IBM Plex Mono',monospace;color:var(--bone)}
  #scene{position:fixed;inset:0;display:block;touch-action:none}

  /* boot overlay */
  #boot{
    position:fixed;inset:0;background:var(--ink);z-index:20;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
    transition:opacity .8s;
  }
  #boot.gone{opacity:0;pointer-events:none}
  #boot .logo{font-size:.95rem;letter-spacing:.3em;color:var(--copper)}
  #boot .bar{width:220px;height:2px;background:var(--line);position:relative;overflow:hidden}
  #boot .bar i{position:absolute;left:0;top:0;bottom:0;width:0;background:var(--copper);transition:width .3s}
  #boot .msg{font-size:.68rem;color:var(--mute);letter-spacing:.12em}

  /* hint chip */
  #hint{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:10;
    background:rgba(18,22,28,.85);border:1px solid var(--line);
    padding:10px 18px;font-size:.7rem;letter-spacing:.1em;color:var(--mute);
    opacity:0;transition:opacity .8s;white-space:nowrap;
  }
  #hint b{color:var(--copper);font-weight:500}
  #hint.show{opacity:1}
  #hint.gone{opacity:0}

  /* corner badge */
  #badge{
    position:fixed;top:18px;left:22px;z-index:10;font-size:.66rem;letter-spacing:.18em;
    color:var(--mute);opacity:0;transition:opacity 1s;
  }
  #badge b{color:var(--copper);font-weight:500}
  #badge.show{opacity:1}

  /* hidden input to summon mobile keyboards */
  #kb{position:fixed;top:-200px;left:-200px;width:1px;height:1px;opacity:0;border:0;background:transparent;color:transparent}

  #nogl{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:30px;text-align:center;color:var(--mute);font-size:.85rem;line-height:1.8}
  #nogl a{color:var(--copper)}
</style>
</head>
<body>

<canvas id="scene"></canvas>
<input id="kb" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="terminal input">

<div id="boot">
  <div class="logo">SWAYAM_OS</div>
  <div class="bar"><i id="bootbar"></i></div>
  <div class="msg" id="bootmsg">loading assets…</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';
if(!window.THREE || !window.WebGLRenderingContext){
  document.getElementById('nogl').style.display='flex';
  document.getElementById('boot').style.display='none';
  return;
}

/* ════════════════════════════ palette ════════════════════════════ */
var C = {
  ink:0x12161C, floor:0x1A1F26, wall:0x232B34, wall2:0x1E252D,
  slate:0x3A4654, slateD:0x2A333E,
  wood:0x6B4F35, woodD:0x57402B,
  bone:0xE9E5DB, mute:0x8B95A1,
  copper:0xC08552, copperD:0x8F5F38,
  screenOff:0x0B0E12, plantG:0x4F6B4A, mugRed:0x8C4A3F
};
var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ════════════════════════════ renderer ════════════════════════════ */
var canvas = document.getElementById('scene');
var renderer;
try{
  renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true});
}catch(e){
  document.getElementById('nogl').style.display='flex';
  document.getElementById('boot').style.display='none';
  return;
}
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(C.ink);

var scene = new THREE.Scene();
scene.fog = new THREE.Fog(C.ink, 14, 30);

var camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, .1, 60);

/* ════════════════════════════ materials ════════════════════════════ */
function mat(c,r,m){ return new THREE.MeshStandardMaterial({color:c, roughness:(r==null?.85:r), metalness:(m==null?.05:m)}); }
var M = {
  floor:mat(C.floor,.95,0), wall:mat(C.wall,.95,0), wall2:mat(C.wall2,.95,0),
  slate:mat(C.slate,.7,.25), slateD:mat(C.slateD,.8,.15),
  wood:mat(C.wood,.75,.05), woodD:mat(C.woodD,.8,.05),
  bone:mat(C.bone,.7,.1), copper:mat(C.copper,.45,.65), copperD:mat(C.copperD,.55,.5),
  black:mat(0x10141A,.6,.3), plant:mat(C.plantG,.9,0), mug:mat(C.mugRed,.7,.05)
};

function box(w,h,d,m,x,y,z,parent){
  var b = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), m);
  b.position.set(x||0,y||0,z||0);
  b.castShadow = b.receiveShadow = true;
  (parent||scene).add(b); return b;
}
function cyl(rt,rb,h,seg,m,x,y,z,parent){
  var c = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg||16), m);
  c.position.set(x||0,y||0,z||0);
  c.castShadow = c.receiveShadow = true;
  (parent||scene).add(c); return c;
}

/* ════════════════════════════ the room ════════════════════════════ */
var floor = new THREE.Mesh(new THREE.PlaneGeometry(34,34), M.floor);
floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

var backWall = new THREE.Mesh(new THREE.PlaneGeometry(34,12), M.wall);
backWall.position.set(0,6,-2.6); backWall.receiveShadow = true; scene.add(backWall);
var leftWall = new THREE.Mesh(new THREE.PlaneGeometry(30,12), M.wall2);
leftWall.rotation.y = Math.PI/2; leftWall.position.set(-7.5,6,8); leftWall.receiveShadow = true; scene.add(leftWall);

// skirting
box(34,.3,.08, M.slateD, 0,.15,-2.56);
box(.08,.3,30, M.slateD, -7.46,.15,8);

// rug
var rug = new THREE.Mesh(new THREE.BoxGeometry(9,.04,6), mat(0x252E27,.95,0));
rug.position.set(0,.02,1.4); rug.receiveShadow = true; scene.add(rug);
box(9,.045,.25, M.copperD, 0,.02,-1.55);
box(9,.045,.25, M.copperD, 0,.02,4.35);

/* window on left wall - night, with a moon */
box(.1,3.4,4.6, M.slateD, -7.42,5.2,3.4);
var glass = new THREE.Mesh(new THREE.PlaneGeometry(4.2,3.0), new THREE.MeshBasicMaterial({color:0x0A1018}));
glass.rotation.y = Math.PI/2; glass.position.set(-7.36,5.2,3.4); scene.add(glass);
var moon = new THREE.Mesh(new THREE.CircleGeometry(.42,24), new THREE.MeshBasicMaterial({color:C.bone}));
moon.rotation.y = Math.PI/2; moon.position.set(-7.35,5.9,2.5); scene.add(moon);
box(.12,3.0,.1, M.slateD, -7.4,5.2,3.4);   // mullion
box(.12,.1,4.2, M.slateD, -7.4,5.2,3.4);

/* poster on back wall - drawn on a canvas, flat colors */
(function(){
  var pc = document.createElement('canvas'); pc.width=256; pc.height=320;
  var g = pc.getContext('2d');
  g.fillStyle='#1A2028'; g.fillRect(0,0,256,320);
  g.strokeStyle='#C08552'; g.lineWidth=3; g.strokeRect(14,14,228,292);
  g.fillStyle='#C08552'; g.font='600 26px monospace'; g.textAlign='center';
  g.fillText('TRUST',128,80); g.fillText('NOTHING',128,114);
  g.fillStyle='#E9E5DB'; g.fillText('VERIFY',128,170); g.fillText('EVERYTHING',128,204);
  g.strokeStyle='#3A4654'; g.lineWidth=2;
  g.beginPath(); g.moveTo(40,250); g.lineTo(100,250); g.lineTo(128,275); g.lineTo(156,250); g.lineTo(216,250); g.stroke();
  g.fillStyle='#C08552'; g.beginPath(); g.arc(128,275,5,0,7); g.fill();
  var tex = new THREE.CanvasTexture(pc);
  var p = new THREE.Mesh(new THREE.PlaneGeometry(1.7,2.12), new THREE.MeshBasicMaterial({map:tex}));
  p.position.set(3.6,5.0,-2.55); scene.add(p);
  box(1.84,2.26,.05, M.slateD, 3.6,5.0,-2.58);
})();

    tex.minFilter = THREE.LinearFilter;
    var m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshBasicMaterial({map:tex}));

var FONT = '500 26px "IBM Plex Mono", monospace';
var LINE_H = 34, PAD_X = 34, PAD_Y = 40;
var COLS, ROWS;
var lines = [];           // {t:text, c:color}
var input = '';
var prompt = 'swayam@chitwan:~$ ';
var cursorOn = true, acceptInput = false, booted = false;
var history = [], histIdx = -1, scrollOff = 0;
var col = {bone:'#E9E5DB', mute:'#8B95A1', copper:'#C08552', err:'#C2655C', ok:'#9DB08A', bg:'#0C1014'};

function measure(){
  tg.font = FONT;
  var cw = tg.measureText('M').width;
  COLS = Math.floor((TW - PAD_X*2)/cw);
  ROWS = Math.floor((TH - PAD_Y*2)/LINE_H);
}
measure();

function pushLine(t,c){
  t = (t==null?'':String(t));
  if(t===''){ lines.push({t:'',c:c||col.bone}); }
  else{
    while(t.length > COLS){ lines.push({t:t.slice(0,COLS), c:c||col.bone}); t=t.slice(COLS); }
    lines.push({t:t, c:c||col.bone});
  }
  if(lines.length > 400) lines.splice(0, lines.length-400);
}
function pushBlock(arr){ arr.forEach(function(l){ pushLine(l[0],l[1]); }); }

function draw(){
  tg.fillStyle = col.bg; tg.fillRect(0,0,TW,TH);
  tg.font = FONT; tg.textBaseline='top';
  // top status bar
  tg.fillStyle = '#161B22'; tg.fillRect(0,0,TW,30);
  tg.fillStyle = col.mute; tg.font='500 18px "IBM Plex Mono", monospace';
  tg.fillText('● ● ●   tty1 - swayam@chitwan', 18, 6);
  var date = new Date();
  var ds = date.toTimeString().slice(0,5);
  tg.fillText(ds, TW-80, 6);
  tg.font = FONT;

  var visible = lines.slice();
  if(booted){
    var inLine = prompt + input + (cursorOn && acceptInput ? '█' : '');
    // wrap the live input line too
    var t = inLine;
    while(t.length > COLS){ visible.push({t:t.slice(0,COLS), c:col.bone, live:true}); t=t.slice(COLS); }
    visible.push({t:t, c:col.bone, live:true});
  }
  var maxOff = Math.max(0, visible.length - ROWS);
  if(scrollOff > maxOff) scrollOff = maxOff;
  var start = Math.max(0, visible.length - ROWS - scrollOff);
  for(var i=start; i<visible.length; i++){
    var L = visible[i], y = PAD_Y + (i-start)*LINE_H;
    if(L.live && L.t.indexOf(prompt)===0){
      tg.fillStyle = col.copper; tg.fillText(prompt, PAD_X, y);
      tg.fillStyle = col.bone;   tg.fillText(L.t.slice(prompt.length), PAD_X + tg.measureText(prompt).width, y);
    }else{
      tg.fillStyle = L.c; tg.fillText(L.t, PAD_X, y);
    }
  }
  // scanline-free, flat. subtle inner frame:
  tg.strokeStyle = '#1B222B'; tg.lineWidth=2; tg.strokeRect(1,1,TW-2,TH-2);
  ttex.needsUpdate = true;
}

}
function cmdOpen(arg){
  var map = {
    web:'https://swayamlama.com.np',
    site:'https://swayamlama.com.np',

  if(!arg || !map[arg]){ pushLine('open: usage - open web | github | linkedin | mail', col.err); return; }
  pushLine('opening '+arg+'…', col.ok);

function runCommand(raw){
  var line = raw.trim();
  pushLine('', col.bone); // spacing handled by echo below
  lines.pop();
  pushLine(prompt + raw, col.mute);
  if(!line) return;
  history.push(raw); histIdx = history.length;
  var parts = line.split(/\s+/);
  var cmd = parts[0].toLowerCase(), arg = parts.slice(1).join(' ').toLowerCase();

  if(cmd==='help'||cmd==='-h'||cmd==='--help'||cmd==='h') cmdHelp();
  else if(cmd==='ls'||cmd==='dir') cmdLs();
  else if(cmd==='cat'||cmd==='less'||cmd==='more'||cmd==='vim'||cmd==='nano') cmdCat(arg);
  else if(cmd==='neofetch') cmdNeofetch();
  else if(cmd==='whoami') pushLine('swayam - the guy you should hire', col.bone);
  else if(cmd==='pwd') pushLine('/home/swayam/portfolio', col.bone);
  else if(cmd==='date') pushLine(new Date().toString(), col.bone);
  else if(cmd==='clear'||cmd==='cls') lines = [];
  else if(cmd==='sudo'){
    if(arg.indexOf('hire-me')>-1 || arg.indexOf('hire')>-1){
      pushBlock([
        ['[sudo] password for recruiter: ********', col.mute],
        ['ACCESS GRANTED.', col.ok],
        ['→ swayamlama4s@gmail.com · +977 982-902-8280', col.copper]
      ]);
    } else pushLine('swayam is not in the sudoers file. this incident will be reported.', col.err);
  }
  else if(cmd==='cv'||cmd==='resume'||cmd==='paper'){ setView('paper'); pushLine('→ zooming to the printed résumé · esc cycles back', col.ok); }
  else if(cmd==='room'||cmd==='look'){ setView('room'); pushLine('→ looking around the room · esc cycles views', col.ok); }
  else if(cmd==='desk'||cmd==='pc'||cmd==='terminal'||cmd==='back'){ setView('desk'); pushLine('→ back at the terminal', col.ok); }
  else if(cmd==='exit'||cmd==='logout') pushLine('nice try. there is no escape from networking.', col.mute);
  else if(cmd==='rm') pushLine('rm: permission denied - this portfolio is immutable', col.err);
  else if(cmd==='ping') pushLine('PONG from chitwan (UTC+5:45): time=0.42ms ttl=64', col.bone);
  else if(cmd==='echo') pushLine(parts.slice(1).join(' '), col.bone);
  else pushLine(cmd+': command not found - try help', col.err);

  pushLine('', col.bone);
  draw();
}

/* ───────────── input ───────────── */
var kb = document.getElementById('kb');
var hintHidden = false;
function hideHint(){
  if(hintHidden) return; hintHidden = true;
  var h = document.getElementById('hint'); h.classList.remove('show'); h.classList.add('gone');
}
function handleKey(e){
  if(!acceptInput) return;
  if(e.key !== 'Escape') scrollOff = 0;
  if(e.ctrlKey && (e.key==='l'||e.key==='L')){ e.preventDefault(); lines=[]; draw(); return; }
  if(e.ctrlKey || e.metaKey || e.altKey) return;
  if(e.key==='Escape'){ toggleView(); return; }
  if(e.key==='Enter'){ e.preventDefault(); var v=input; input=''; runCommand(v); hideHint(); return; }
  if(e.key==='Backspace'){ e.preventDefault(); input = input.slice(0,-1); draw(); return; }
  if(e.key==='ArrowUp'){ e.preventDefault(); if(history.length){ histIdx=Math.max(0,histIdx-1); input=history[histIdx]||''; draw(); } return; }
  if(e.key==='ArrowDown'){ e.preventDefault(); if(history.length){ histIdx=Math.min(history.length,histIdx+1); input=history[histIdx]||''; draw(); } return; }
  if(e.key==='Tab'){ e.preventDefault();
    var p = input.split(/\s+/); var last = p[p.length-1];
    if(last){ var m = FILE_ORDER.filter(function(f){return f.indexOf(last)===0;});
      if(m.length===1){ p[p.length-1]=m[0]; input=p.join(' '); draw(); } }
    return;
  }
  if(e.key.length===1){ e.preventDefault(); input += e.key; draw(); }
}
window.addEventListener('keydown', function(e){
  if(document.activeElement === kb) return; // kb handles its own
  handleKey(e);
});
kb.addEventListener('keydown', function(e){
  if(e.key && e.key.length===1){ e.preventDefault(); if(acceptInput){ input+=e.key; draw(); } return; }
  if(e.key==='Unidentified') return; // mobile → input event
  handleKey(e);
});
kb.addEventListener('input', function(){
  if(kb.value && acceptInput){ input += kb.value; draw(); }
  kb.value = '';
});
canvas.addEventListener('pointerdown', function(){ kb.focus({preventScroll:true}); });
canvas.addEventListener('wheel', function(e){
  if(!booted) return;
  e.preventDefault();
  scrollOff = Math.max(0, scrollOff + (e.deltaY > 0 ? -3 : 3));
  draw();
}, {passive:false});

/* cursor blink */
setInterval(function(){ cursorOn = !cursorOn; if(booted) draw(); }, 530);

/* ════════════════════════════ camera ════════════════════════════ */
var VIEW = {
  far:   {pos:new THREE.Vector3(7.5,5.2,11.5), look:new THREE.Vector3(0,2.4,0),     par:{x:0,y:0}},
  desk:  {pos:new THREE.Vector3(0,2.95,3.05),  look:new THREE.Vector3(0,2.93,-.6),  par:{x:.35,y:.22}},
  paper: {pos:new THREE.Vector3(2.95,3.62,1.22),look:new THREE.Vector3(2.95,1.70,.5), par:{x:.1,y:.06}},
  room:  {pos:new THREE.Vector3(4.6,3.6,7.6),  look:new THREE.Vector3(-.4,2.4,-.2), par:{x:1.2,y:.8}}
};
var VIEW_ORDER = ['desk','paper','room'];   // esc cycles: pc → résumé → room → pc
var viewIdx = 0;
var camPos = VIEW.far.pos.clone(), camLook = VIEW.far.look.clone();
var target = VIEW.desk;
var introT = 0, introDur = reduceMotion ? .01 : 4.2, introDone = false;
function ease(t){ return t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

function setView(name){
  var i = VIEW_ORDER.indexOf(name);
  viewIdx = (i<0?0:i);
  target = VIEW[VIEW_ORDER[viewIdx]];
}
function toggleView(){ setView(VIEW_ORDER[(viewIdx+1)%VIEW_ORDER.length]); }

var mx=0,my=0,smx=0,smy=0;
window.addEventListener('pointermove',function(e){
  mx = e.clientX/innerWidth - .5;
  my = e.clientY/innerHeight - .5;
},{passive:true});

function resize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  // pull camera back a touch on narrow screens so the monitor fits
  VIEW.desk.pos.z = innerWidth < 700 ? 4.3 : (innerWidth < 1000 ? 3.55 : 3.05);
  VIEW.paper.pos.y = innerWidth < 700 ? 4.4 : (innerWidth < 1000 ? 3.9 : 3.62);
}
window.addEventListener('resize', resize); resize();

/* ════════════════════════════ boot overlay ════════════════════════════ */
var bootEl = document.getElementById('boot'), bar = document.getElementById('bootbar'), bmsg = document.getElementById('bootmsg');
var bootSteps = ['loading assets…','compiling shaders…','warming up the chiya…','connecting tty1…'];
var bs = 0;
var bootInt = setInterval(function(){
  bs++;
  bar.style.width = Math.min(100, bs*25)+'%';
  bmsg.textContent = bootSteps[Math.min(bs, bootSteps.length-1)];
  if(bs>=4){ clearInterval(bootInt); }
},260);

function start(){
  bootEl.classList.add('gone');
  draw();
  typeIntro();
  prevT = performance.now();
  requestAnimationFrame(tick);
}
if(document.fonts && document.fonts.ready){
  Promise.race([document.fonts.ready, new Promise(function(r){setTimeout(r,2500);})]).then(function(){ setTimeout(start, 1100); });
}else{
  setTimeout(start, 1400);
}

/* ════════════════════════════ loop ════════════════════════════ */
var clockY = -1, prevT = 0;
function tick(t){
  requestAnimationFrame(tick);
  var dt = Math.min(.05,(t-prevT)/1000); prevT = t;

  if(!introDone){
    introT += dt;
    var k = ease(Math.min(1, introT/introDur));
    camPos.lerpVectors(VIEW.far.pos, VIEW.desk.pos, k);
    camLook.lerpVectors(VIEW.far.look, VIEW.desk.look, k);
    if(introT >= introDur) introDone = true;
  } else {
    var tp = target.pos, tl = target.look;
    smx += (mx-smx)*.05; smy += (my-smy)*.05;
    var px = tp.x + smx*target.par.x;
    var py = tp.y - smy*target.par.y;
    var pz = tp.z;
    camPos.x += (px-camPos.x)*.06;
    camPos.y += (py-camPos.y)*.06;
    camPos.z += (pz-camPos.z)*.06;
    camLook.x += (tl.x-camLook.x)*.06;
    camLook.y += (tl.y-camLook.y)*.06;
    camLook.z += (tl.z-camLook.z)*.06;
  }
  camera.position.copy(camPos);
  camera.lookAt(camLook);

  // refresh the clock in the status bar once a minute
  var mins = new Date().getMinutes();
  if(mins !== clockY){ clockY = mins; if(booted) draw(); }

  renderer.render(scene, camera);
}
})();
